<title>환율 계산기</title>
<style>
:root {
  --bg:#0a0a0f; --sf:#12121a; --bd:rgba(255,255,255,.07);
  --ac:#4f8eff; --ac2:#7b5ea7; --tx:#f0f0f8;
  --mu:rgba(240,240,248,.45); --dm:rgba(240,240,248,.2);
  --gn:#34d399; --or:#f59e0b; --rd:#f87171;
  --st:env(safe-area-inset-top,44px); --sb:env(safe-area-inset-bottom,20px);
  --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:var(--font);color:var(--tx);-webkit-font-smoothing:antialiased}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(ellipse at 25% 10%,rgba(79,142,255,.09) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 85%,rgba(123,94,167,.08) 0%,transparent 50%),var(--bg)}
.safe-top{height:var(--st);flex-shrink:0}
.hdr{padding:6px 16px 8px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pill{display:flex;align-items:center;gap:5px;background:var(--sf);
  border:1px solid var(--bd);border-radius:20px;padding:4px 9px;
  font-size:11px;color:var(--mu);font-family:var(--mono);white-space:nowrap;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--gn);box-shadow:0 0 6px var(--gn);animation:pulse 2s infinite}
.dot.ld{background:var(--or);box-shadow:0 0 6px var(--or)}
.dot.er{background:var(--rd);box-shadow:0 0 6px var(--rd);animation:none}
.dot.mn{background:#a78bfa;box-shadow:0 0 6px #a78bfa;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.rfbtn{background:none;border:none;cursor:pointer;color:var(--mu);font-size:14px;padding:1px 2px;line-height:1;-webkit-appearance:none}
.rfbtn.sp{animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px;
  padding-bottom:calc(14px + var(--sb));-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* Cards */
.card{background:var(–sf);border:1px solid var(–bd);border-radius:20px;
padding:16px 18px;margin-bottom:9px;position:relative;overflow:hidden}
.card::before{content:’’;position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 55%);pointer-events:none}
.card.from{border-color:rgba(79,142,255,.18)}
.card.to{border-color:rgba(79,142,255,.38);
background:linear-gradient(145deg,rgba(79,142,255,.13) 0%,rgba(79,142,255,.04) 100%)}
.clbl{font-size:10px;color:var(–mu);font-weight:600;letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}
.crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.amt{flex:1;background:none;border:none;outline:none;font-family:var(–mono);
font-size:34px;font-weight:500;color:var(–tx);min-width:0;caret-color:var(–ac);
-webkit-appearance:none}
.amt::placeholder{color:var(–dm)}
.res{font-family:var(–mono);font-size:34px;font-weight:500;color:var(–ac);
min-height:41px;display:flex;align-items:center;flex:1;min-width:0;word-break:break-all}
.cbtn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:7px 11px;
cursor:pointer;flex-shrink:0;-webkit-appearance:none;-webkit-touch-callout:none;user-select:none}
.cbtn:active{transform:scale(.93)}
.cbtn-code{font-size:14px;font-weight:700;color:var(–tx)}
.csub{font-size:11px;color:var(–dm);margin-top:5px}

/* Swap */
.swrap{display:flex;justify-content:center;margin:-1px 0;z-index:10;position:relative}
.sbtn{width:38px;height:38px;border-radius:50%;
background:linear-gradient(135deg,var(–ac) 0%,var(–ac2) 100%);
border:none;cursor:pointer;color:#fff;font-size:16px;
box-shadow:0 4px 18px rgba(79,142,255,.42);
display:flex;align-items:center;justify-content:center;
-webkit-appearance:none;-webkit-touch-callout:none;user-select:none}
.sbtn:active{transform:scale(.86) rotate(180deg)}

/* Rate row */
.rinfo{background:var(–sf);border:1px solid var(–bd);border-radius:13px;
padding:11px 14px;display:flex;justify-content:space-between;align-items:center;
margin-bottom:9px;gap:8px}
.rtxt{font-size:12px;color:var(–tx);font-family:var(–mono);flex:1;min-width:0;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rbdg{font-size:9px;color:var(–mu);background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:3px 7px;flex-shrink:0}

/* Quick */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:13px}
.qbtn{padding:9px 0;border-radius:10px;background:var(–sf);border:1px solid var(–bd);
color:var(–mu);font-size:11px;font-weight:600;cursor:pointer;
font-family:var(–mono);-webkit-appearance:none;-webkit-touch-callout:none;user-select:none}
.qbtn:active,.qbtn.act{background:rgba(79,142,255,.16);border-color:rgba(79,142,255,.42);color:var(–ac)}

/* ── 네이버 직접입력 배너 ── */
.naver-banner{
background:linear-gradient(135deg,rgba(3,199,90,.12) 0%,rgba(3,199,90,.05) 100%);

padding:13px 14px;margin-bottom:9px;
}

font-size:11px;font-weight:600;text-decoration:none;cursor:pointer;
-webkit-appearance:none}
.nb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.nb-item{display:flex;flex-direction:column;gap:3px}
.nb-label{font-size:10px;color:var(–mu);font-family:var(–mono)}
.nb-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);

.nb-input:focus{border-color:rgba(3,199,90,.5);background:rgba(3,199,90,.07)}
.nb-apply{margin-top:8px;width:100%;padding:9px;border-radius:10px;

color:#03c75a;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.nb-apply:active{background:rgba(3,199,90,.28)}

/* Table */
.slbl{font-size:10px;font-weight:700;color:var(–mu);letter-spacing:1px;
text-transform:uppercase;padding:0 2px;margin-bottom:7px}
.rtbl{background:var(–sf);border:1px solid var(–bd);border-radius:18px;
overflow:hidden;margin-bottom:18px}
.rrow{display:flex;align-items:center;padding:11px 14px;
border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;
-webkit-touch-callout:none;user-select:none}
.rrow:last-child{border-bottom:none}
.rrow:active{background:rgba(255,255,255,.05)}
.rrow.sel{background:rgba(79,142,255,.09)}
.rf{font-size:20px;margin-right:11px;flex-shrink:0}
.ri{flex:1;min-width:0}.rc{font-size:13px;font-weight:700}.rn{font-size:10px;color:var(–dm);margin-top:1px}
.rv{text-align:right;flex-shrink:0}
.rkv{font-size:13px;font-weight:700;font-family:var(–mono)}
.rsrc{font-size:9px;margin-top:1px;font-family:var(–mono)}
.rsrc.api{color:var(–or)}.rsrc.manual{color:#03c75a}.rsrc.fb{color:var(–rd)}
.rut{font-size:10px;color:var(–dm);font-family:var(–mono)}
.snote{text-align:center;font-size:10px;color:var(–dm);padding:0 0 4px}

/* Picker */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);
-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
display:flex;flex-direction:column;justify-content:flex-end;
opacity:0;pointer-events:none;transition:opacity .22s}
.ov.show{opacity:1;pointer-events:all}
.psh{background:#14141f;border-top:1px solid rgba(255,255,255,.08);
border-radius:22px 22px 0 0;padding:0 0 var(–sb);max-height:72vh;
display:flex;flex-direction:column;
transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.ov.show .psh{transform:translateY(0)}
.phdl{width:34px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:11px auto 0}
.phdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 10px}
.pttl{font-size:15px;font-weight:700}
.pclose{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.1);
border:none;color:var(–mu);font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.plst{overflow-y:auto;padding:0 10px 10px;-webkit-overflow-scrolling:touch}
.pitm{display:flex;align-items:center;gap:11px;padding:11px 9px;border-radius:11px;
cursor:pointer;-webkit-touch-callout:none;user-select:none}
.pitm:active{background:rgba(255,255,255,.06)}
.pitm.sel{background:rgba(79,142,255,.13)}
.pf{font-size:24px;flex-shrink:0}.pi{flex:1}
.pc{font-size:14px;font-weight:700}.pn{font-size:11px;color:var(–dm)}
.pck{font-size:16px;color:var(–ac);flex-shrink:0}

/* Toast */
.toast{position:fixed;bottom:calc(28px + var(–sb));left:50%;
transform:translateX(-50%) translateY(16px);background:#1c1c2e;
border:1px solid rgba(248,113,113,.3);border-radius:11px;
padding:9px 15px;font-size:11px;color:var(–rd);
white-space:nowrap;opacity:0;transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(52,211,153,.3);color:var(–gn)}
</style>

<script>
const CUR = [
  {c:'KRW',n:'한국 원',         f:'🇰🇷',s:'₩',  u:1},
  {c:'USD',n:'미국 달러',       f:'🇺🇸',s:'$',  u:1},
  {c:'JPY',n:'일본 엔',         f:'🇯🇵',s:'¥',  u:100},
  {c:'EUR',n:'유로',            f:'🇪🇺',s:'€',  u:1},
  {c:'CNY',n:'중국 위안',       f:'🇨🇳',s:'¥',  u:1},
  {c:'GBP',n:'영국 파운드',     f:'🇬🇧',s:'£',  u:1},
  {c:'HKD',n:'홍콩 달러',       f:'🇭🇰',s:'HK$',u:1},
  {c:'CAD',n:'캐나다 달러',     f:'🇨🇦',s:'CA$',u:1},
  {c:'AUD',n:'호주 달러',       f:'🇦🇺',s:'A$', u:1},
  {c:'CHF',n:'스위스 프랑',     f:'🇨🇭',s:'Fr', u:1},
  {c:'SGD',n:'싱가포르 달러',   f:'🇸🇬',s:'S$', u:1},
  {c:'THB',n:'태국 바트',       f:'🇹🇭',s:'฿',  u:1},
  {c:'VND',n:'베트남 동',       f:'🇻🇳',s:'₫',  u:100},
  {c:'MYR',n:'말레이시아 링깃', f:'🇲🇾',s:'RM', u:1},
  {c:'PHP',n:'필리핀 페소',     f:'🇵🇭',s:'₱',  u:1},
];

// 2026년 3월 기준 fallback
const FB = {KRW:1,USD:1476,JPY:9.83,EUR:1602,CNY:202.5,
            GBP:1891,HKD:189.2,CAD:1022,AUD:924,CHF:1641,
            SGD:1095,THB:42.8,VND:5.78,MYR:330,PHP:25.5};

// 환율 소스 추적: 'fb'=기본값, 'api'=자동조회, 'manual'=직접입력
let rates = {...FB};
let sources = Object.fromEntries(Object.keys(FB).map(k=>[k,'fb']));
let from='USD', to='KRW', pTarget='from';
const ci = c => CUR.find(x=>x.c===c)||CUR[0];

// ── 입력 UI 생성 ──────────────────────────────────────────────────────
function buildInputs() {
  const grid = document.getElementById('nbGrid');
  grid.innerHTML = CUR.filter(x=>x.c!=='KRW').map(c=>`
    <div class="nb-item">
      <div class="nb-label">${c.f} ${c.c}${c.u>1?' ('+c.u+'당)':''}</div>
      <input class="nb-input" id="ni_${c.c}" type="number" inputmode="decimal"
             placeholder="${(rates[c.c]||FB[c.c]||0).toFixed(2)}"
             value="">
    </div>`).join('');
}

function applyManual() {
  let count = 0;
  CUR.filter(x=>x.c!=='KRW').forEach(c=>{
    const el = document.getElementById('ni_'+c.c);
    const v = parseFloat(el.value);
    if (!isNaN(v) && v > 0) {
      rates[c.c] = v;
      sources[c.c] = 'manual';
      el.value = '';
      el.placeholder = v.toFixed(2);
      count++;
    }
  });
  if (count > 0) {
    const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Seoul'});
    setDot('mn', t+' 직접입력');
    renderTable(); calc();
    showToast('✓ '+count+'개 통화 적용됨', 'ok');
  } else {
    showToast('입력된 값이 없습니다');
  }
}

// ── API 로드 ──────────────────────────────────────────────────────────
async function loadRates() {
  setDot('ld','조회 중...');
  document.getElementById('rfbtn').classList.add('sp');

  const tryFetch = async (url, parse) => {
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 7000);
    try {
      const r = await fetch(url, {signal:ctrl.signal, mode:'cors', cache:'no-cache'});
      clearTimeout(timer);
      if (!r.ok) throw new Error('HTTP '+r.status);
      return parse(await r.json());
    } catch(e) { clearTimeout(timer); throw e; }
  };

  const parseER = d => {
    if (d.result!=='success'||!d.rates) throw new Error('bad');
    const out={KRW:1};
    CUR.filter(x=>x.c!=='KRW').forEach(c=>{
      const r=d.rates[c.c]; if(r&&r>0) out[c.c]=(1/r)*c.u;
    });
    if(!out.USD||out.USD<800||out.USD>3000) throw new Error('invalid');
    return out;
  };

  const parseFW = d => {
    const kr=d.krw; if(!kr) throw new Error('no krw');
    const out={KRW:1};
    CUR.filter(x=>x.c!=='KRW').forEach(c=>{
      const r=kr[c.c.toLowerCase()]; if(r&&r>0) out[c.c]=(1/r)*c.u;
    });
    if(!out.USD||out.USD<800||out.USD>3000) throw new Error('invalid');
    return out;
  };

  const today = new Date().toISOString().slice(0,10);
  const apis = [
    ['https://open.er-api.com/v6/latest/KRW', parseER],
    [`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${today}/v1/currencies/krw.json`, parseFW],
    ['https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/krw.json', parseFW],
  ];

  for (const [url, parser] of apis) {
    try {
      const newRates = await tryFetch(url, parser);
      // manual로 입력된 것은 덮어쓰지 않음
      Object.keys(newRates).forEach(k=>{
        if (sources[k] !== 'manual') {
          rates[k] = newRates[k];
          sources[k] = 'api';
        }
      });
      const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Seoul'});
      const manualCount = Object.values(sources).filter(s=>s==='manual').length;
      if (manualCount > 0) {
        setDot('mn', t+' (직입 '+manualCount+'개)');
      } else {
        setDot('ok', t+' 자동조회');
      }
      document.getElementById('rfbtn').classList.remove('sp');
      buildInputs(); renderTable(); calc();
      return;
    } catch(e) {}
  }

  setDot('er','조회 실패');
  showToast('⚠️ 자동조회 실패 · 아래에서 직접 입력해주세요');
  document.getElementById('rfbtn').classList.remove('sp');
  buildInputs(); renderTable(); calc();
}

function setDot(s,t){
  const d=document.getElementById('dot'), tx=document.getElementById('stxt');
  d.className='dot'+(s==='ld'?' ld':s==='er'?' er':s==='mn'?' mn':'');
  tx.textContent=t;
}
function showToast(msg, type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||'');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── 계산 ─────────────────────────────────────────────────────────────
function calc(){
  const raw=document.getElementById('ainput').value;
  const v=parseFloat(raw);
  const el=document.getElementById('rdisp');
  if(!raw||isNaN(v)){el.textContent='—';updRate();return;}
  const fr=rates[from]||1, tr=rates[to]||1;
  const fu=ci(from).u, tu=ci(to).u;
  const krw=from==='KRW'?v:v*(fr/fu);
  const res=to==='KRW'?krw:krw/(tr/tu);
  el.textContent=fmt(res,to);
  updRate();
}

function fmt(n,c){
  if(isNaN(n))return'—';
  if(c==='KRW'||c==='VND') return n.toLocaleString('ko-KR',{maximumFractionDigits:0});
  if(c==='JPY') return n.toLocaleString('ko-KR',{maximumFractionDigits:2});
  return n.toLocaleString('ko-KR',{maximumFractionDigits:4});
}

function updRate(){
  const el=document.getElementById('rtxt');
  if(from===to){el.textContent='동일 통화';return;}
  const fr=rates[from]||1, tr=rates[to]||1;
  const fu=ci(from).u, tu=ci(to).u;
  if(to==='KRW')
    el.textContent=`1 ${from} = ₩${(fr/fu).toLocaleString('ko-KR',{maximumFractionDigits:2})}`;
  else if(from==='KRW')
    el.textContent=`₩1 = ${ci(to).s}${(1/(tr/tu)).toFixed(6)}`;
  else
    el.textContent=`1 ${from} = ${ci(to).s}${((fr/fu)/(tr/tu)).toFixed(4)}`;
}

function setQ(v){
  document.getElementById('ainput').value=v; calc();
  document.querySelectorAll('.qbtn').forEach(b=>
    b.classList.toggle('act',parseInt(b.textContent.replace(/,/g,''))===v));
}

// ── 표 렌더 ───────────────────────────────────────────────────────────
function renderTable(){
  document.getElementById('rtbl').innerHTML=CUR.filter(x=>x.c!=='KRW').map(c=>{
    const r=rates[c.c]||FB[c.c]||0;
    const src=sources[c.c]||'fb';
    const srcLabel=src==='manual'?'🟢 직접입력':src==='api'?'🟡 자동조회':'🔴 기본값';
    const srcClass=src==='manual'?'manual':src==='api'?'api':'fb';
    const unit=c.u>1?`<div class="rut">${c.u}${c.c}당</div>`:'';
    const sel=(from===c.c||to===c.c)?'sel':'';
    return`<div class="rrow ${sel}" onclick="pickRow('${c.c}')">
      <span class="rf">${c.f}</span>
      <div class="ri"><div class="rc">${c.c}</div><div class="rn">${c.n}</div></div>
      <div class="rv">
        <div class="rkv">₩${r.toLocaleString('ko-KR',{maximumFractionDigits:2})}</div>
        ${unit}
        <div class="rsrc ${srcClass}">${srcLabel}</div>
      </div>
    </div>`;
  }).join('');
}

function pickRow(c){from=c;to='KRW';updUI();calc();}

// ── UI ────────────────────────────────────────────────────────────────
function doSwap(){[from,to]=[to,from];updUI();calc();}
function updUI(){
  const fi=ci(from),ti=ci(to);
  document.getElementById('ff').textContent=fi.f;
  document.getElementById('fc').textContent=fi.c;
  document.getElementById('fn').textContent=fi.n;
  document.getElementById('tf').textContent=ti.f;
  document.getElementById('tc').textContent=ti.c;
  document.getElementById('tn').textContent=ti.n;
  renderTable();
}

// ── Picker ────────────────────────────────────────────────────────────
function openPicker(t){
  pTarget=t;
  document.getElementById('pttl').textContent=t==='from'?'보내는 통화':'받는 통화';
  const cur=t==='from'?from:to;
  document.getElementById('plst').innerHTML=CUR.map(c=>`
    <div class="pitm ${c.c===cur?'sel':''}" onclick="pickCur('${c.c}')">
      <span class="pf">${c.f}</span>
      <div class="pi"><div class="pc">${c.c}</div><div class="pn">${c.n}</div></div>
      ${c.c===cur?'<span class="pck">✓</span>':''}
    </div>`).join('');
  document.getElementById('ov').classList.add('show');
}
function pickCur(c){
  if(pTarget==='from')from=c;else to=c;
  updUI();calc();closePicker();
}
function closePicker(){document.getElementById('ov').classList.remove('show');}
function bgClose(e){if(e.target===document.getElementById('ov'))closePicker();}

// ── Init ─────────────────────────────────────────────────────────────
buildInputs();
updUI();
renderTable();
calc();
loadRates();

if('serviceWorker'in navigator&&location.protocol==='https:')
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
